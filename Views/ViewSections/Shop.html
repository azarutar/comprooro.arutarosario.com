<div class="container content-section" style="padding-top: var(--section-pad); padding-bottom: var(--section-pad);">

    <div class="text-center mb-2">
        <h1 class="section-title">Catalogo</h1>
        <p style="color: var(--smoke); margin-top: -0.4rem;">Scopri la nostra selezione di gioielli e preziosi</p>
    </div>

    <div class="row g-2 mb-2" style="border-bottom: 1px solid var(--border-glass); padding-bottom: 0.8rem;">
        <div class="col-md-6">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input id="searchProductInput" type="text" class="form-control" placeholder="Cerca articolo...">
            </div>
        </div>
        <div class="col-md-3">
            <select id="categoryFilter" class="form-select">
                <option selected>Tutte le categorie</option>
                <option>Anelli</option>
                <option>Collane</option>
                <option>Orecchini</option>
                <option>Bracciali</option>
                <option>Orologi</option>
                <option>Ciondoli</option>
                <option>Ferma cravatta</option>
            </select>
        </div>
        <div class="col-md-3">
            <select id="materialFilter" class="form-select">
                <option selected>Tutti i materiali</option>
                <option>Oro Giallo</option>
                <option>Oro Bianco</option>
                <option>Oro Rosa</option>
                <option>Argento</option>
                <option>Platino</option>
            </select>
        </div>
    </div>

    <div class="mb-2">
        <p id="productCount" class="mb-0" style="color: var(--smoke); font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.1em;"></p>
    </div>

    <div id="gridProducts" class="row g-2"></div>

    <nav class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item">
                <a class="page-link" href="#" aria-label="Previous"><span aria-hidden="true">&laquo;</span></a>
            </li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item">
                <a class="page-link" href="#" aria-label="Next"><span aria-hidden="true">&raquo;</span></a>
            </li>
        </ul>
    </nav>
</div>
