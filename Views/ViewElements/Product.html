<!-- Prodotto -->
<div class="col-xl-3 col-lg-4 col-md-6 fade-in-up">
    <div class="card product-card h-100" data-product-id=":|§.id.§|:" style="cursor: pointer;">
        <div class="position-relative">
            <div class="product-img-container">
                <img src=":|§.imagePath.§|:" alt=":|§.title.§|:" class="product-img" loading="lazy">
            </div>
            <span class="badge badge-featured">:|§.featured.§|:</span>
            <span class="badge badge-img-count">:|§.imageCount.§|:</span>
        </div>
        <div class="card-body d-flex flex-column">
            <h5 class="card-title">:|§.title.§|:</h5>
            <p class="card-text mb-1" style="font-size: 0.92rem; color: var(--champagne); letter-spacing: 0.05em;">
                :|§.material.§|: &middot; :|§.weight.§|:gr &middot; :|§.condition.§|:
            </p>
            <p class="card-text mb-1">:|§.description.§|:</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
                <span style="font-size: 0.82rem; color: var(--smoke); letter-spacing: 0.08em; text-transform: uppercase;">ID :|§.id.§|:</span>
                <button class="btn btn-sm btn-outline-warning btn-dettagli">
                    <i class="bi bi-arrow-right me-1"></i>Dettagli
                </button>
            </div>
        </div>
    </div>
</div>
